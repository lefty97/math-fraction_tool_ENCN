<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraction Master Explorer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
            padding: 0 20px 40px 20px;
            margin: 0;
        }
        .nav-bar {
            background-color: #34495e;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: 0 0 10px 10px;
        }
        .nav-bar a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            margin: 0 10px;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
            display: inline-block;
        }
        .nav-bar a:hover, .nav-bar a.active { background-color: #e67e22; }
        .container {
            background-color: white;
            max-width: 950px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            position: relative;
        }
        .lang-switch { position: absolute; top: 20px; right: 20px; }
        .lang-switch select { font-size: 1rem; padding: 5px 10px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }
        .section-divider { margin: 50px 0; border: 0; height: 2px; background-image: linear-gradient(to right, transparent, #bdc3c7, transparent); }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 1.1rem; flex-wrap: wrap; margin-top: 20px; }
        input[type="number"], input[type="text"], select.setting-select { font-size: 1.1rem; padding: 5px; border: 1px solid #bdc3c7; border-radius: 4px; }
        .visual-input { width: 60px; text-align: center; }
        
        /* 分數輸入樣式 */
        .input-fraction { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; background: #fff; border: 1px solid #bdc3c7; border-radius: 5px; padding: 2px 5px; }
        .input-fraction input { border: none; width: 45px; text-align: center; font-size: 1.1rem; outline: none; background: transparent; }
        .input-fraction .divider { width: 100%; border-top: 2px solid #333; margin: 2px 0; }

        .equation { font-size: 1.6rem; font-weight: bold; margin: 20px 0; padding: 15px; border-radius: 10px; line-height: 1.4; }
        .eq-orange { background-color: #fef9e7; color: #d35400; }
        .eq-blue { background-color: #ebf5fb; color: #2980b9; }
        .eq-green { background-color: #e8f8f5; color: #27ae60; }
        
        .vis-area { display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-end; gap: 20px; margin-top: 20px; min-height: 140px; }
        .choco-bar { width: 50px; border: 3px solid #3e2723; border-radius: 4px; display: flex; flex-direction: column; background-color: #efebe9; }
        .choco-piece { width: 100%; border: 1px solid #27140f; box-sizing: border-box; }
        .choco-piece.filled { background-color: #795548; }
        .choco-piece.empty { background-color: transparent; }
        .bottle { width: 45px; border: 3px solid #1f618d; border-radius: 5px 5px 15px 15px; display: flex; flex-direction: column-reverse; background-color: #fdfefe; }
        .bottle-level { width: 100%; border-top: 1px solid #1a5276; box-sizing: border-box; }
        .bottle-level.filled { background-color: #3498db; }
        .svg-container { margin: 5px; filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15)); }

        .arith-box { display: flex; flex-direction: column; align-items: center; border: 2px solid #ecf0f1; border-radius: 10px; padding: 20px; background: #fafafa; }
        .vs-sign { font-size: 2.5rem; color: #7f8c8d; font-weight: bold; margin: 0 10px; }

        /* 測驗區 */
        .quiz-panel { background-color: #f4f6f6; padding: 25px; border-radius: 10px; margin-top: 20px; }
        #quiz-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 20px; }
        .question-item { background-color: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 2px solid #d6eaf8; }
        .question-row { font-size: 1.4rem; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .quiz-input { width: 50px; text-align: center; font-size: 1.2rem; margin: 0 2px; border: 2px solid #bdc3c7; border-radius: 4px; }
        .quiz-input.correct { background-color: #d5f5e3; border-color: #27ae60; color: #27ae60; font-weight: bold;}
        .quiz-input.wrong { background-color: #fadedb; border-color: #e74c3c; color: #e74c3c; font-weight: bold;}
        .solution-box { background-color: #fcf3cf; color: #d35400; padding: 12px; margin-top: 15px; border-radius: 8px; display: none; line-height: 1.5; }
        .btn { background-color: #2980b9; color: white; border: none; padding: 8px 15px; font-size: 1.1rem; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background-color: #1f618d; }
        .btn-check { background-color: #27ae60; font-size: 1.3rem; padding: 12px 30px; margin-top: 20px;}
        .submit-area { background-color: #fff; border: 2px dashed #bdc3c7; border-radius: 10px; padding: 15px; margin: 25px auto; display: none; max-width: 500px; }
        #student-name { margin-top: 15px; display: none; width: 80%; }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="index.html" class="active">🍕 Fractions</a>
    <a href="1a2b.html">🔢 1A2B Game</a>
    <a href="angles.html">📐 Geometry Explorer</a>
</div>

<div class="container">
    <div class="lang-switch">
        <select id="language" onchange="changeLanguage()">
            <option value="en" selected>English</option>
            <option value="zh">繁體中文</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <!-- ================= 1. 假分數/帶分數 ================= -->
    <h2 id="text-title1">🍕 Improper & Mixed Fractions</h2>
    <div class="controls">
        <input type="number" id="num" class="visual-input" value="7"> / <input type="number" id="den" class="visual-input" value="2">
        <span id="text-shape">Shape:</span>
        <select id="shape" class="setting-select">
            <option value="pizza" id="opt-pizza">Pizza</option>
            <option value="choco" id="opt-choco">Choco Bar</option>
        </select>
    </div>
    <div class="equation eq-orange" id="equation"></div>
    <div id="visualization" class="vis-area"></div>

    <hr class="section-divider">

    <!-- ================= 2. 分數運算探險家 (全新加減法) ================= -->
    <h2 id="text-title-arith">🧮 Fraction Arithmetic Explorer</h2>
    <p id="text-sub-arith">See how fractions are added or subtracted!</p>
    
    <div class="controls">
        <div class="input-fraction">
            <input type="number" id="ar-n1" value="1">
            <div class="divider"></div>
            <input type="number" id="ar-d1" value="2">
        </div>
        <select id="ar-op" class="setting-select" style="font-size: 1.5rem;">
            <option value="add">+</option>
            <option value="sub">−</option>
        </select>
        <div class="input-fraction">
            <input type="number" id="ar-n2" value="1">
            <div class="divider"></div>
            <input type="number" id="ar-d2" value="3">
        </div>
        <span id="text-ar-shape">Shape:</span>
        <select id="ar-shape" class="setting-select">
            <option value="pizza">Pizza</option>
            <option value="choco">Choco Bar</option>
        </select>
    </div>

    <div class="arith-box">
        <div class="equation eq-green" id="ar-equation" style="width: 100%;"></div>
        <div class="equiv-vs-box" id="ar-vis-container">
            <div id="ar-vis-1" class="vis-area" style="margin:0"></div>
            <div class="vs-sign" id="ar-op-sign">+</div>
            <div id="ar-vis-2" class="vis-area" style="margin:0"></div>
            <div class="vs-sign">=</div>
            <div id="ar-vis-res" class="vis-area" style="margin:0"></div>
        </div>
    </div>

    <hr class="section-divider">

    <!-- ================= 3. 測驗區 ================= -->
    <h2 id="text-title2">📝 Fraction Practice Generator</h2>
    <div class="quiz-panel">
        <div class="quiz-settings">
            <label><span id="text-qtype">Type: </span>
                <select id="quiz-type" class="setting-select">
                    <option value="mix">All Types</option>
                    <option value="imp2mix">Improper ⇄ Mixed</option>
                    <option value="equiv">Equivalent Fractions</option>
                    <option value="arithLike">Add/Sub (Like Denom)</option>
                    <option value="arithUnlike">Add/Sub (Unlike Denom)</option>
                </select>
            </label>
            <label><span id="text-qyear">Level: </span>
                <select id="quiz-year" class="setting-select">
                    <option value="4" selected>Year 4</option>
                    <option value="5">Year 5</option>
                    <option value="6">Year 6</option>
                </select>
            </label>
            <button class="btn" id="btn-generate" onclick="generateQuiz()">Generate</button>
        </div>

        <div id="quiz-container"></div>
        
        <div id="submit-area" class="submit-area">
            <label><input type="checkbox" id="chk-submit" onchange="toggleNameInput()"> <span id="text-submit-teacher">Submit to teacher</span></label><br>
            <input type="text" id="student-name" placeholder="Name">
            <div id="submit-status"></div>
        </div>
        <button class="btn btn-check" id="btn-check" style="display:none" onclick="checkAnswers()">Check Answers</button>
        <div id="score-display" class="score-display"></div>
    </div>
</div>

<script>
    const teacherEmail = "anita20700@gmail.com";
    const translations = {
        en: {
            title1: "🍕 Improper & Mixed Fractions", shape: "Shape:", pizza: "Pizza", choco: "Choco Bar",
            titleArith: "🧮 Fraction Arithmetic Explorer", subArith: "Like or Unlike Denominators Addition & Subtraction",
            title2: "📝 Fraction Practice Generator", qtype: "Type:", qyear: "Level:", btnGen: "Generate", btnCheck: "Check Answers",
            submitTeacher: "Submit results to teacher", requireName: "⚠️ Name required!", sentSuccess: "✅ Sent!", sentError: "❌ Failed",
            errDiv: "Cannot divide evenly!", solArith: "Step 1: Find common denominator ({lcd}).<br>Step 2: Calculate: {n1} {op} {n2} = {res}."
        },
        zh: {
            title1: "🍕 假分數與帶分數轉換", shape: "圖形：", pizza: "披薩", choco: "巧克力棒",
            titleArith: "🧮 分數加減法運算", subArith: "支援同分母與異分母的加減法視覺化",
            title2: "📝 分數互動測驗", qtype: "題型：", qyear: "難度：", btnGen: "產生題目", btnCheck: "對答案",
            submitTeacher: "將成績提交給老師", requireName: "⚠️ 請輸入名字！", sentSuccess: "✅ 成績已送出！", sentError: "❌ 傳送失敗",
            errDiv: "無法整除！", solArith: "步驟 1：找出公分母 ({lcd})。<br>步驟 2：計算分子：{n1} {op} {n2} = {res}。"
        },
        ja: {
            title1: "🍕 仮分数と帯分数", shape: "形：", pizza: "ピザ", choco: "チョコバー",
            titleArith: "🧮 分数の加減算", subArith: "同分母・異分母の計算を視覚化します",
            title2: "📝 分数練習問題", qtype: "種類：", qyear: "学年：", btnGen: "問題作成", btnCheck: "答え合わせ",
            submitTeacher: "先生に送信する", requireName: "⚠️ 名前を入力してください", sentSuccess: "✅ 送信完了！", sentError: "❌ 失敗しました",
            errDiv: "割り切れません！", solArith: "手順 1：通分する ({lcd})。<br>手順 2：分子を計算：{n1} {op} {n2} = {res}。"
        }
    };

    let currentLang = 'en';
    let currentQuizData = [];

    function changeLanguage() {
        currentLang = document.getElementById('language').value;
        localStorage.setItem('mySiteLang', currentLang);
        const t = translations[currentLang];
        document.getElementById('text-title1').innerText = t.title1;
        document.getElementById('text-title-arith').innerText = t.titleArith;
        document.getElementById('text-sub-arith').innerText = t.subArith;
        document.getElementById('text-title2').innerText = t.title2;
        updateVisualization();
        updateArith();
    }

    // 繪圖核心
    function createPizzaSVG(den, filledSlices) {
        const radius = 45, center = 50;
        let svg = `<svg class="svg-container" viewBox="0 0 100 100" width="80" height="80">`;
        svg += `<circle cx="${center}" cy="${center}" r="${radius}" fill="#fdf2e9" stroke="#e67e22" stroke-width="2"/>`;
        if (filledSlices > 0) {
            if (filledSlices === den) svg += `<circle cx="${center}" cy="${center}" r="${radius}" fill="#e67e22"/>`;
            else {
                const angle = (filledSlices / den) * 2 * Math.PI;
                const x2 = center + radius * Math.cos(-Math.PI/2 + angle), y2 = center + radius * Math.sin(-Math.PI/2 + angle);
                const largeArc = filledSlices / den > 0.5 ? 1 : 0;
                svg += `<path d="M ${center} ${center} L 50 5 A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="#e67e22"/>`;
            }
        }
        for (let i = 0; i < den; i++) {
            const a = -Math.PI/2 + (i/den)*2*Math.PI;
            svg += `<line x1="50" y1="50" x2="${50+45*Math.cos(a)}" y2="${50+45*Math.sin(a)}" stroke="#873600" stroke-width="1"/>`;
        }
        return svg + `</svg>`;
    }

    function renderShapes(id, num, den, shape, fixedH = 120) {
        const vis = document.getElementById(id); vis.innerHTML = '';
        const containers = Math.ceil(num/den) || 1;
        let left = num;
        for (let i = 0; i < containers; i++) {
            let fill = Math.min(den, left);
            if (shape === 'pizza') vis.innerHTML += createPizzaSVG(den, fill);
            else {
                let div = document.createElement('div'); div.className = 'choco-bar'; div.style.height = fixedH + 'px';
                for (let j = 0; j < den; j++) {
                    let p = document.createElement('div'); p.className = 'choco-piece' + (j < fill ? ' filled' : ' empty');
                    p.style.height = (100/den) + '%'; div.appendChild(p);
                }
                vis.appendChild(div);
            }
            left -= fill;
        }
    }

    // 工具 1 更新
    function updateVisualization() {
        const n = parseInt(document.getElementById('num').value), d = parseInt(document.getElementById('den').value), s = document.getElementById('shape').value;
        if (isNaN(n) || isNaN(d) || d <= 0) return;
        const w = Math.floor(n/d), r = n%d;
        document.getElementById('equation').innerText = r === 0 ? `${n}/${d} = ${w}` : `${n}/${d} = ${w} ... ${r}/${d}`;
        renderShapes('visualization', n, d, s);
    }

    // 工具 2 更新 (加減法)
    function updateArith() {
        const n1 = parseInt(document.getElementById('ar-n1').value), d1 = parseInt(document.getElementById('ar-d1').value);
        const n2 = parseInt(document.getElementById('ar-n2').value), d2 = parseInt(document.getElementById('ar-d2').value);
        const op = document.getElementById('ar-op').value, shape = document.getElementById('ar-shape').value;
        if ([n1,d1,n2,d2].some(isNaN) || d1<=0 || d2<=0) return;

        const lcd = (d1 === d2) ? d1 : d1 * d2;
        const nn1 = (d1 === d2) ? n1 : n1 * d2;
        const nn2 = (d1 === d2) ? n2 : n2 * d1;
        const resN = op === 'add' ? nn1 + nn2 : nn1 - nn2;
        
        document.getElementById('ar-op-sign').innerText = op === 'add' ? '+' : '−';
        let eqText = `${n1}/${d1} ${op==='add'?'+':'-'} ${n2}/${d2}`;
        if (d1 !== d2) eqText += ` = ${nn1}/${lcd} ${op==='add'?'+':'-'} ${nn2}/${lcd}`;
        eqText += ` = ${resN}/${lcd}`;
        document.getElementById('ar-equation').innerText = eqText;

        const h = Math.max(120, lcd * 4);
        renderShapes('ar-vis-1', nn1, lcd, shape, h);
        renderShapes('ar-vis-2', nn2, lcd, shape, h);
        renderShapes('ar-vis-res', Math.max(0, resN), lcd, shape, h);
    }

    // 測驗生成
    function generateQuiz() {
        const type = document.getElementById('quiz-type').value, year = parseInt(document.getElementById('quiz-year').value);
        const container = document.getElementById('quiz-container');
        container.innerHTML = ''; currentQuizData = [];
        document.getElementById('btn-check').style.display = 'inline-block';
        document.getElementById('submit-area').style.display = 'block';

        for (let i = 0; i < 6; i++) {
            let qT = type === 'mix' ? ['imp2mix', 'equiv', 'arithLike', 'arithUnlike'][Math.floor(Math.random()*4)] : type;
            let qH = "", ans = {}, sol = "";
            
            if (qT === 'imp2mix') {
                let d = Math.floor(Math.random()*8)+2, w = Math.floor(Math.random()*4)+1, r = Math.floor(Math.random()*(d-1))+1, n = w*d+r;
                ans = {w, r}; qH = `<div class="fraction-display"><span class="num">${n}</span><span class="den">${d}</span></div> = <input type="number" class="quiz-input" id="q${i}-w"> <div class="fraction-display"><span class="num"><input type="number" class="quiz-input" id="q${i}-r"></span><span class="den">${d}</span></div>`;
            } else if (qT === 'equiv') {
                let b = Math.floor(Math.random()*6)+2, a = Math.floor(Math.random()*(b-1))+1, m = Math.floor(Math.random()*3)+2, c = a*m, d = b*m;
                ans = {c}; qH = `<div class="fraction-display"><span class="num">${a}</span><span class="den">${b}</span></div> = <div class="fraction-display"><span class="num"><input type="number" class="quiz-input" id="q${i}-c"></span><span class="den">${d}</span></div>`;
            } else {
                let d1 = Math.floor(Math.random()*6)+2, d2 = qT === 'arithLike' ? d1 : Math.floor(Math.random()*5)+2;
                let n1 = Math.floor(Math.random()*5)+1, n2 = Math.floor(Math.random()*5)+1;
                let lcd = d1*d2 / gcd(d1,d2);
                let resN = (n1*(lcd/d1)) + (n2*(lcd/d2));
                ans = {resN, lcd}; 
                qH = `<div class="fraction-display"><span class="num">${n1}</span><span class="den">${d1}</span></div> + <div class="fraction-display"><span class="num">${n2}</span><span class="den">${d2}</span></div> = <div class="fraction-display"><span class="num"><input type="number" class="quiz-input" id="q${i}-resN"></span><span class="den"><input type="number" class="quiz-input" id="q${i}-lcd"></span></div>`;
            }

            let item = document.createElement('div'); item.className = 'question-item';
            item.innerHTML = `<div class="question-row">Q${i+1}. ${qH}</div>`;
            container.appendChild(item);
            currentQuizData.push({ans});
        }
    }

    function gcd(a,b) { return b === 0 ? a : gcd(b, a%b); }

    function checkAnswers() {
        let score = 0;
        currentQuizData.forEach((d, i) => {
            let correct = true;
            for (let key in d.ans) {
                let el = document.getElementById(`q${i}-${key}`);
                if (parseInt(el.value) === d.ans[key]) el.classList.add('correct');
                else { el.classList.add('wrong'); correct = false; }
            }
            if (correct) score++;
        });
        document.getElementById('score-display').innerText = `Score: ${score} / ${currentQuizData.length}`;
        if (document.getElementById('chk-submit').checked) sendToTeacher(score);
    }

    async function sendToTeacher(s) {
        const name = document.getElementById('student-name').value;
        if (!name) { alert("Please enter name"); return; }
        try {
            await fetch(`https://formsubmit.co/ajax/${teacherEmail}`, {
                method: "POST", headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, score: s, total: currentQuizData.length })
            });
            document.getElementById('submit-status').innerText = "✅ Sent!";
        } catch(e) { document.getElementById('submit-status').innerText = "❌ Error"; }
    }

    function toggleNameInput() { document.getElementById('student-name').style.display = document.getElementById('chk-submit').checked ? 'block' : 'none'; }

    // 事件監聽
    ['num', 'den', 'shape'].forEach(id => document.getElementById(id).oninput = updateVisualization);
    ['ar-n1', 'ar-d1', 'ar-n2', 'ar-d2', 'ar-op', 'ar-shape'].forEach(id => document.getElementById(id).onchange = updateArith);
    ['ar-n1', 'ar-d1', 'ar-n2', 'ar-d2'].forEach(id => document.getElementById(id).oninput = updateArith);

    window.onload = () => {
        const s = localStorage.getItem('mySiteLang');
        if (s) document.getElementById('language').value = s;
        changeLanguage();
    };
</script>
</body>
</html>
