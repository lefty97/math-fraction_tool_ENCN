<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraction Shapeshifter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .container {
            background-color: white;
            max-width: 850px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            position: relative;
        }
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-switch select {
            font-size: 1rem;
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            cursor: pointer;
            background-color: #fff;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        input[type="number"] {
            width: 65px;
            font-size: 1.2rem;
            text-align: center;
            padding: 5px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
        }
        select.shape-select {
            font-size: 1.2rem;
            padding: 5px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
        }
        .equation {
            font-size: 1.8rem;
            font-weight: bold;
            color: #d35400;
            margin: 20px 0;
            padding: 15px;
            background-color: #fef9e7;
            border-radius: 10px;
        }
        #visualization {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-top: 30px;
            min-height: 150px;
        }
        
        /* 巧克力棒樣式 (加強分隔線) */
        .choco-bar {
            width: 60px;
            border: 3px solid #3e2723;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            background-color: #efebe9;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .choco-piece {
            width: 100%;
            /* 內部加上明顯的白色/深咖啡色框線 */
            border: 1px solid #27140f; 
            box-sizing: border-box;
        }
        .choco-piece.filled { background-color: #795548; }
        .choco-piece.empty { background-color: transparent; }
        
        /* 水瓶樣式 (加強分隔線) */
        .bottle {
            width: 50px;
            border: 3px solid #1f618d;
            border-radius: 5px 5px 15px 15px;
            display: flex;
            flex-direction: column-reverse;
            background-color: #fdfefe;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
        .bottle-level {
            width: 100%;
            /* 內部加上明顯的藍色實線 */
            border-top: 2px solid #1a5276; 
            box-sizing: border-box;
        }
        .bottle-level:first-child { border-top: none; }
        .bottle-level.filled { background-color: #3498db; }
        .bottle-level.empty { background-color: transparent; }

        /* SVG 容器樣式 */
        .svg-container {
            margin: 5px;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.15));
        }
    </style>
</head>
<body>

<style>
    .nav-bar {
        background-color: #34495e;
        padding: 15px;
        text-align: center;
        margin-bottom: 20px;
        border-radius: 0 0 10px 10px;
    }
    .nav-bar a {
        color: white;
        text-decoration: none;
        font-size: 1.2rem;
        margin: 0 15px;
        padding: 5px 10px;
        border-radius: 5px;
        transition: background 0.3s;
    }
    .nav-bar a:hover, .nav-bar a.active {
        background-color: #e67e22;
    }
</style>
    
<div class="nav-bar">
    <a href="index.html" class="active">🍕 Fractions</a>  
    <a href="1a2b.html">🔢 1A2B Game</a>
    <a href="angles.html">📐 Angle Explorer</a>
</div>
    
<div class="container">
    <div class="lang-switch">
        <select id="language" onchange="changeLanguage()">
            <option value="en" selected>English</option>
            <option value="zh">繁體中文</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <h2 id="text-title">🍕 Fraction Shapeshifter 🍫</h2>
    <p id="text-subtitle">Change the numerator and denominator to see how an improper fraction transforms into a mixed number!</p>
    
    <div class="controls">
        <label><span id="text-num">Numerator: </span><input type="number" id="num" value="7" min="1" max="50"></label>
        <span style="font-size: 1.5rem; font-weight: bold;">/</span>
        <label><span id="text-den">Denominator: </span><input type="number" id="den" value="2" min="2" max="20"></label>
        <label><span id="text-shape">Shape: </span>
            <select id="shape" class="shape-select">
                <option value="pizza" id="opt-pizza">Pizza (Circle)</option>
                <option value="choco" id="opt-choco">Choco Bar (Rectangle)</option>
                <option value="bottle" id="opt-bottle">Bottle (Cylinder)</option>
            </select>
        </label>
    </div>

    <div class="equation" id="equation"></div>
    
    <div id="visualization"></div>
</div>

<script>
    // 語言翻譯字典
    const translations = {
        en: {
            title: "🍕 Fraction Shapeshifter 🍫",
            subtitle: "Change the numerator and denominator to see how an improper fraction transforms into a mixed number!",
            num: "Numerator: ",
            den: "Denominator: ",
            shape: "Shape: ",
            pizza: "Pizza (Circle)",
            choco: "Choco Bar (Rectangle)",
            bottle: "Bottle (Cylinder)",
            properMsg: " is a proper fraction",
            andMsg: " and "
        },
        zh: {
            title: "🍕 分數變形金剛 🍫",
            subtitle: "試著改變分子和分母，看看假分數如何變身成帶分數！",
            num: "分子：",
            den: "分母：",
            shape: "形狀：",
            pizza: "披薩 (圓形)",
            choco: "巧克力棒 (長方形)",
            bottle: "水瓶 (量筒)",
            properMsg: " 是真分數",
            andMsg: " 又 "
        },
        ja: {
            title: "🍕 分数シェイプシフター 🍫",
            subtitle: "分子と分母を変更して、仮分数が帯分数にどのように変わるか見てみよう！",
            num: "分子：",
            den: "分母：",
            shape: "形：",
            pizza: "ピザ（円）",
            choco: "チョコバー（長方形）",
            bottle: "ボトル（円柱）",
            properMsg: " は真分数です",
            andMsg: " と "
        }
    };

    let currentLang = 'en';

    function changeLanguage() {
        currentLang = document.getElementById('language').value;
        // 👇 新增這一行：把選擇的語言存進瀏覽器的記憶裡
        localStorage.setItem('mySiteLang', currentLang);
        
        
        document.getElementById('text-title').innerText = translations[currentLang].title;
        document.getElementById('text-subtitle').innerText = translations[currentLang].subtitle;
        document.getElementById('text-num').innerText = translations[currentLang].num;
        document.getElementById('text-den').innerText = translations[currentLang].den;
        document.getElementById('text-shape').innerText = translations[currentLang].shape;
        
        document.getElementById('opt-pizza').innerText = translations[currentLang].pizza;
        document.getElementById('opt-choco').innerText = translations[currentLang].choco;
        document.getElementById('opt-bottle').innerText = translations[currentLang].bottle;

        updateVisualization();
    }

    // 產生披薩的 SVG 函數 (確保切割線清晰)
    function createPizzaSVG(den, filledSlices) {
        const radius = 45;
        const center = 50;
        let svg = `<svg class="svg-container" viewBox="0 0 100 100" width="90" height="90">`;
        
        // 底部圓形 (餅皮)
        svg += `<circle cx="${center}" cy="${center}" r="${radius}" fill="#fdf2e9" stroke="#e67e22" stroke-width="2"/>`;

        // 畫填滿的披薩片
        if (filledSlices > 0) {
            if (filledSlices === den) {
                // 全滿
                svg += `<circle cx="${center}" cy="${center}" r="${radius}" fill="#e67e22"/>`;
            } else {
                // 部分填滿 (使用 SVG Path 畫扇形)
                const angle = (filledSlices / den) * 2 * Math.PI;
                const startAngle = -Math.PI / 2; // 從正上方開始
                const endAngle = startAngle + angle;
                
                const x1 = center + radius * Math.cos(startAngle);
                const y1 = center + radius * Math.sin(startAngle);
                const x2 = center + radius * Math.cos(endAngle);
                const y2 = center + radius * Math.sin(endAngle);
                
                const largeArcFlag = filledSlices / den > 0.5 ? 1 : 0;
                
                svg += `<path d="M ${center} ${center} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2} Z" fill="#e67e22"/>`;
            }
        }

        // 畫清晰的切割線 (黑線或深橘線)
        for (let i = 0; i < den; i++) {
            const angle = -Math.PI / 2 + (i / den) * 2 * Math.PI;
            const x = center + radius * Math.cos(angle);
            const y = center + radius * Math.sin(angle);
            svg += `<line x1="${center}" y1="${center}" x2="${x}" y2="${y}" stroke="#873600" stroke-width="2"/>`;
        }

        svg += `</svg>`;
        return svg;
    }

    function updateVisualization() {
        const num = parseInt(document.getElementById('num').value);
        const den = parseInt(document.getElementById('den').value);
        const shape = document.getElementById('shape').value;
        const vis = document.getElementById('visualization');
        const eq = document.getElementById('equation');

        if (isNaN(num) || isNaN(den) || den <= 0) return;

        const whole = Math.floor(num / den);
        const remainder = num % den;

        // 更新方程式文字
        if (remainder === 0) {
            eq.innerText = `${num} / ${den} = ${whole}`;
        } else if (whole === 0) {
            eq.innerText = `${num} / ${den}${translations[currentLang].properMsg}`;
        } else {
            eq.innerText = `${num} / ${den} = ${whole}${translations[currentLang].andMsg}${remainder}/${den}`;
        }

        vis.innerHTML = '';
        const totalContainers = Math.ceil(num / den);
        let filledPiecesCount = 0;

        for (let i = 0; i < totalContainers; i++) {
            // 計算這個容器需要填滿幾格
            let piecesInThisContainer = Math.min(den, num - filledPiecesCount);
            
            if (shape === 'pizza') {
                // 使用 SVG 披薩
                vis.innerHTML += createPizzaSVG(den, piecesInThisContainer);
                filledPiecesCount += piecesInThisContainer;
            } else {
                // 巧克力與水瓶使用 Div
                let containerDiv = document.createElement('div');
                containerDiv.className = shape === 'choco' ? 'choco-bar' : 'bottle';
                // 固定每個格子高度為 25px，總高度隨分母變化
                containerDiv.style.height = (den * 25) + 'px'; 
                
                for (let j = 0; j < den; j++) {
                    let pieceDiv = document.createElement('div');
                    pieceDiv.className = shape === 'choco' ? 'choco-piece' : 'bottle-level';
                    pieceDiv.style.height = (100 / den) + '%';
                    
                    if (filledPiecesCount < num) {
                        pieceDiv.classList.add('filled');
                        filledPiecesCount++;
                    } else {
                        pieceDiv.classList.add('empty');
                    }
                    containerDiv.appendChild(pieceDiv);
                }
                vis.appendChild(containerDiv);
            }
        }
    }

    document.getElementById('num').addEventListener('input', updateVisualization);
    document.getElementById('den').addEventListener('input', updateVisualization);
    document.getElementById('shape').addEventListener('change', updateVisualization);

    // 初始載入時執行
    // 👇 新增這段：網頁一打開時，先去檢查有沒有存過語言記憶
    window.onload = function() {
        const savedLang = localStorage.getItem('mySiteLang');
        if (savedLang) {
            // 如果有記憶，就把下拉選單自動切換過去
            document.getElementById('language').value = savedLang;
        }
        // 最後再執行語言更新與畫面初始化
        changeLanguage();
    };
</script>

</body>
</html>
