<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angle Explorer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
            padding: 0 20px 20px 20px;
            margin: 0;
        }
        .nav-bar {
            background-color: #34495e;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: 0 0 10px 10px;
        }
        .nav-bar a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            margin: 0 10px;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .nav-bar a:hover, .nav-bar a.active {
            background-color: #e67e22;
        }
        .container {
            background-color: white;
            max-width: 850px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            position: relative;
        }
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-switch select {
            font-size: 1rem;
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .control-panel {
            background-color: #fef9e7;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.2rem;
        }
        input[type="range"] {
            width: 80%;
            margin: 20px 0;
        }
        .equation {
            font-size: 2rem;
            font-weight: bold;
            color: #d35400;
            margin-top: 20px;
            padding: 15px;
            background-color: #fff9c4;
            border-radius: 10px;
        }
        .visual-box {
            background-color: #fff;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="index.html">🍕 Fractions</a>
    <a href="1a2b.html">🔢 1A2B Game</a>
    <a href="angles.html" class="active">📐 Angle Explorer</a>
</div>

<div class="container">
    <div class="lang-switch">
        <select id="language" onchange="changeLanguage()">
            <option value="en" selected>English</option>
            <option value="zh">繁體中文</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <h2 id="text-title">📐 Angle Explorer</h2>
    <p id="text-subtitle">Drag the slider to see how Angle A and B change on a straight line (180°).</p>
    
    <div class="control-panel">
        <label><strong id="text-label-a">Angle A:</strong> <span id="val-a">60</span>°</label>
        <br>
        <input type="range" id="angle-slider" min="0" max="180" value="60">
    </div>

    <div class="visual-box">
        <svg viewBox="0 0 400 200" width="100%" height="250">
            <path id="arc-a" fill="rgba(230, 126, 34, 0.25)" stroke="#d35400" stroke-width="1.5" />
            <path id="arc-b" fill="rgba(52, 152, 219, 0.25)" stroke="#2980b9" stroke-width="1.5" />

            <line x1="30" y1="150" x2="370" y2="150" stroke="#34495e" stroke-width="4" />
            <circle cx="200" cy="150" r="5" fill="#e74c3c" />
            <line id="ray" x1="200" y1="150" x2="300" y2="50" stroke="#e67e22" stroke-width="4" stroke-linecap="round" />
            
            <text x="280" y="175" font-weight="bold" font-size="18" fill="#d35400">A</text>
            <text x="110" y="175" font-weight="bold" font-size="18" fill="#2980b9">B</text>
            
            <text x="300" y="130" id="type-a" font-size="15" fill="#d35400" font-weight="bold" text-anchor="middle"></text>
            <text x="100" y="130" id="type-b" font-size="15" fill="#2980b9" font-weight="bold" text-anchor="middle"></text>
        </svg>
    </div>

    <div class="equation" id="equation">60° + 120° = 180°</div>
</div>

<script>
    const translations = {
        en: {
            title: "📐 Angle Explorer",
            subtitle: "Drag the slider to see how Angle A and B change on a straight line (180°).",
            labelA: "Adjust Angle A:",
            acute: "Acute",
            right: "Right",
            obtuse: "Obtuse",
            straight: "Straight",
            zero: "Zero",
            nameA: "Angle A",
            nameB: "Angle B"
        },
        zh: {
            title: "📐 角度探險家",
            subtitle: "拖曳滑桿來觀察直線上的角 A 與角 B 如何變化（相加為 180°）。",
            labelA: "調整角度 A：",
            acute: "銳角",
            right: "直角",
            obtuse: "鈍角",
            straight: "平角",
            zero: "零角",
            nameA: "角 A",
            nameB: "角 B"
        },
        ja: {
            title: "📐 角度エクスプローラー",
            subtitle: "スライダーを動かして、直線上の角Aと角Bがどのように変化するか見てみよう（合計180°）。",
            labelA: "角度 A を調整：",
            acute: "鋭角",
            right: "直角",
            obtuse: "鈍角",
            straight: "平角",
            zero: "零角",
            nameA: "角 A",
            nameB: "角 B"
        }
    };

    let currentLang = 'en';

    function changeLanguage() {
        currentLang = document.getElementById('language').value;
        const t = translations[currentLang];
        
        document.getElementById('text-title').innerText = t.title;
        document.getElementById('text-subtitle').innerText = t.subtitle;
        document.getElementById('text-label-a').innerText = t.labelA;
        
        update();
    }

    function getAngleType(deg) {
        const t = translations[currentLang];
        if (deg === 0) return t.zero;
        if (deg < 90) return t.acute;
        if (deg === 90) return t.right;
        if (deg < 180) return t.obtuse;
        return t.straight;
    }

    function update() {
        const a = parseInt(document.getElementById('angle-slider').value);
        const b = 180 - a;
        const t = translations[currentLang];

        document.getElementById('val-a').innerText = a;
        
        // 數學常數設定
        const cx = 200; // 中心點 X
        const cy = 150; // 中心點 Y
        const rayLen = 120; // 射線長度
        const arcRadius = 45; // 標示角度的弧線半徑
        
        // 計算射線終點座標 (注意 SVG 的 Y 軸是往下遞增，所以角度要加負號)
        const rad = (a * Math.PI) / 180;
        const x2 = cx + rayLen * Math.cos(-rad);
        const y2 = cy + rayLen * Math.sin(-rad);
        
        // 更新射線
        const ray = document.getElementById('ray');
        ray.setAttribute('x2', x2);
        ray.setAttribute('y2', y2);

        // --- 繪製角 A 弧線 (橘色) ---
        // 從右側 (0度) 開始，畫到射線位置
        const arcAx = cx + arcRadius * Math.cos(-rad);
        const arcAy = cy + arcRadius * Math.sin(-rad);
        // SVG Path 指令: M 移動到圓心 -> L 畫線到右側起點 -> A 畫弧線到射線交點 -> Z 封閉回到圓心
        const pathA = `M ${cx} ${cy} L ${cx + arcRadius} ${cy} A ${arcRadius} ${arcRadius} 0 0 0 ${arcAx} ${arcAy} Z`;
        
        // --- 繪製角 B 弧線 (藍色) ---
        // 從左側 (180度) 開始，畫到射線位置
        // SVG Path 指令: M 移動到圓心 -> L 畫線到左側起點 -> A 畫弧線到射線交點 -> Z 封閉回到圓心
        // sweep-flag 設為 1 (順著時鐘方向畫回去找射線)
        const pathB = `M ${cx} ${cy} L ${cx - arcRadius} ${cy} A ${arcRadius} ${arcRadius} 0 0 1 ${arcAx} ${arcAy} Z`;

        // 特殊情況處理：當角度是 0 或 180 時，避免 SVG 弧線指令出錯，手動設定為完整的半圓
        if (a === 0) {
            document.getElementById('arc-a').setAttribute('d', ''); // A 是空的
            document.getElementById('arc-b').setAttribute('d', `M ${cx} ${cy} L ${cx - arcRadius} ${cy} A ${arcRadius} ${arcRadius} 0 0 1 ${cx + arcRadius} ${cy} Z`); // B 是半圓
        } else if (a === 180) {
            document.getElementById('arc-a').setAttribute('d', `M ${cx} ${cy} L ${cx + arcRadius} ${cy} A ${arcRadius} ${arcRadius} 0 0 0 ${cx - arcRadius} ${cy} Z`); // A 是半圓
            document.getElementById('arc-b').setAttribute('d', ''); // B 是空的
        } else {
            document.getElementById('arc-a').setAttribute('d', pathA);
            document.getElementById('arc-b').setAttribute('d', pathB);
        }

        // 更新分類文字與顏色對應
        document.getElementById('type-a').textContent = `${t.nameA} = ${a}° (${getAngleType(a)})`;
        document.getElementById('type-b').textContent = `${t.nameB} = ${b}° (${getAngleType(b)})`;

        // 更新下方的大算式
        document.getElementById('equation').innerText = `${a}° + ${b}° = 180°`;
    }

    document.getElementById('angle-slider').oninput = update;
    changeLanguage();
</script>

</body>
</html>
